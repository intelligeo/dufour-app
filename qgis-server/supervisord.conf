[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:nginx]
command=nginx -g 'daemon off;'
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/nginx.err.log
stdout_logfile=/var/log/supervisor/nginx.out.log

[program:qgis-server]
command=spawn-fcgi -n -p 9993 -u www-data -g www-data -- /usr/lib/cgi-bin/qgis_mapserv.fcgi
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/qgis-server.err.log
stdout_logfile=/var/log/supervisor/qgis-server.out.log
