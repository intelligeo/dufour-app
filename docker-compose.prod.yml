version: '3.8'

services:
  # Backend API + QGIS Server (Embedded)
  dufour-api:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    container_name: dufour-api-prod
    environment:
      # PostgreSQL external (alwaysdata.net)
      POSTGIS_HOST: postgresql-intelligeo.alwaysdata.net
      POSTGIS_PORT: 5432
      POSTGIS_DB: intelligeo_dufour
      POSTGIS_USER: intelligeo_dufour
      POSTGIS_PASSWORD: ${POSTGIS_PASSWORD}
      # QGIS Server embedded
      QGIS_SERVER_URL: http://localhost:8080
      QGIS_SERVER_LOG_LEVEL: 1
      QGIS_SERVER_PARALLEL_RENDERING: 1
      QGIS_SERVER_MAX_THREADS: 2
      QGIS_SERVER_IGNORE_BAD_LAYERS: 1
      LOG_LEVEL: INFO
    ports:
      - "3000:3000"
      - "8080:8080"
    volumes:
      - qgis-cache:/tmp/qgis_cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - dufour-network
    restart: unless-stopped

  # Frontend (Nginx + Built React)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: dufour-frontend-prod
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - dufour-api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dufour-network
    restart: unless-stopped

volumes:
  qgis-cache:
    driver: local

networks:
  dufour-network:
    driver: bridge
