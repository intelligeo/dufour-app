version: '3.8'

services:
  # Backend API + QGIS Server (Embedded)
  dufour-api:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    container_name: dufour-api
    environment:
      # PostgreSQL external (alwaysdata.net)
      POSTGIS_HOST: postgresql-intelligeo.alwaysdata.net
      POSTGIS_PORT: 5432
      POSTGIS_DB: intelligeo_dufour
      POSTGIS_USER: intelligeo_dufour
      POSTGIS_PASSWORD: Dufour.00r
      # QGIS Server embedded (localhost)
      QGIS_SERVER_URL: http://localhost:8080
      QGIS_SERVER_LOG_LEVEL: 0
      QGIS_SERVER_PARALLEL_RENDERING: 1
      QGIS_SERVER_MAX_THREADS: 2
      QGIS_SERVER_IGNORE_BAD_LAYERS: 1
      LOG_LEVEL: DEBUG
    ports:
      - "3000:3000"  # FastAPI
      - "8080:8080"  # QGIS Server
    volumes:
      - ./backend/api:/app
      - qgis-cache:/tmp/qgis_cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dufour-network

  # Frontend Development Server
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: dufour-frontend-dev
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - dufour-api
    networks:
      - dufour-network

  # Nginx (for production builds)
  nginx:
    image: nginx:alpine
    container_name: dufour-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - qgis-server
    profiles:
      - production
    networks:
      - dufour-network

volumes:
  qgis-cache:
    driver: local

networks:
  dufour-network:
    driver: bridge
