<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" width="280" height="48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
  </defs>
  <!-- Background pill -->
  <rect width="280" height="48" rx="8" fill="url(#bg)"/>
  <!-- Compass/map icon -->
  <g transform="translate(24,24)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="14" fill="none" stroke="#FFD54F" stroke-width="1.5"/>
    <!-- North arrow -->
    <polygon points="0,-12 3,-4 0,-6 -3,-4" fill="#FFD54F"/>
    <!-- South arrow -->
    <polygon points="0,12 3,4 0,6 -3,4" fill="rgba(255,213,79,0.5)"/>
    <!-- Cross hairs -->
    <line x1="-12" y1="0" x2="-5" y2="0" stroke="#FFD54F" stroke-width="1"/>
    <line x1="5" y1="0" x2="12" y2="0" stroke="#FFD54F" stroke-width="1"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="2" fill="#FFD54F"/>
  </g>
  <!-- App name -->
  <text x="48" y="22" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" letter-spacing="1.5">DUFOUR</text>
  <text x="48" y="37" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#FFD54F" letter-spacing="0.5">Military Mapping</text>
  <!-- Divider line -->
  <line x1="168" y1="8" x2="168" y2="40" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Swiss cross (small) -->
  <g transform="translate(186,24)">
    <rect x="-6" y="-6" width="12" height="12" rx="1" fill="#D32F2F"/>
    <rect x="-4" y="-1.5" width="8" height="3" fill="white"/>
    <rect x="-1.5" y="-4" width="3" height="8" fill="white"/>
  </g>
  <!-- Topographic lines decoration -->
  <g transform="translate(220,24)" opacity="0.6">
    <path d="M-15,8 Q-8,0 0,4 Q8,-6 15,-2" fill="none" stroke="#A5D6A7" stroke-width="1"/>
    <path d="M-15,4 Q-8,-4 0,0 Q8,-10 15,-6" fill="none" stroke="#A5D6A7" stroke-width="1"/>
    <path d="M-15,0 Q-8,-8 0,-4 Q8,-14 15,-10" fill="none" stroke="#A5D6A7" stroke-width="1"/>
  </g>
</svg>
